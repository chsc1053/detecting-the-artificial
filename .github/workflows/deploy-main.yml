name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      ECR_API_REPO: ${{ vars.ECR_API_REPO }}
      ECR_WEB_REPO: ${{ vars.ECR_WEB_REPO }}
      EB_APP_NAME: ${{ vars.EB_APP_NAME }}
      EB_API_ENV_NAME: ${{ vars.EB_API_ENV_NAME }}
      EB_WEB_ENV_NAME: ${{ vars.EB_WEB_ENV_NAME }}
      EB_S3_BUCKET: ${{ vars.EB_S3_BUCKET }}
      IMAGE_TAG: ${{ github.sha }}
      # Unique per workflow run so re-runs / duplicate SHAs do not collide on EB version labels
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image (linux/amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_API_REPO:$IMAGE_TAG" \
            -f backend/Dockerfile \
            backend \
            --push

      - name: Build frontend assets
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          rm -rf web/dist
          cp -R frontend/dist web/dist

      - name: Build and push web image (linux/amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_WEB_REPO:$IMAGE_TAG" \
            -f web/Dockerfile \
            web \
            --push

      - name: Bundle API Dockerrun
        run: |
          cat > Dockerrun.aws.json <<EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_API_REPO:$IMAGE_TAG",
              "Update": "true"
            },
            "Ports": [
              { "ContainerPort": "3000" }
            ]
          }
          EOF
          zip -j api-deploy.zip Dockerrun.aws.json

      - name: Deploy API environment
        run: |
          VERSION_LABEL="api-${IMAGE_TAG}-${RUN_ID}"
          S3_KEY="${VERSION_LABEL}.zip"
          aws s3 cp api-deploy.zip "s3://$EB_S3_BUCKET/$S3_KEY"
          aws elasticbeanstalk create-application-version \
            --application-name "$EB_APP_NAME" \
            --version-label "$VERSION_LABEL" \
            --source-bundle S3Bucket="$EB_S3_BUCKET",S3Key="$S3_KEY"
          aws elasticbeanstalk update-environment \
            --environment-name "$EB_API_ENV_NAME" \
            --version-label "$VERSION_LABEL"

      - name: Bundle web Dockerrun
        run: |
          cat > Dockerrun.aws.json <<EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_WEB_REPO:$IMAGE_TAG",
              "Update": "true"
            },
            "Ports": [
              { "ContainerPort": "80" }
            ]
          }
          EOF
          zip -j web-deploy.zip Dockerrun.aws.json

      - name: Deploy web environment
        run: |
          VERSION_LABEL="web-${IMAGE_TAG}-${RUN_ID}"
          S3_KEY="${VERSION_LABEL}.zip"
          aws s3 cp web-deploy.zip "s3://$EB_S3_BUCKET/$S3_KEY"
          aws elasticbeanstalk create-application-version \
            --application-name "$EB_APP_NAME" \
            --version-label "$VERSION_LABEL" \
            --source-bundle S3Bucket="$EB_S3_BUCKET",S3Key="$S3_KEY"
          aws elasticbeanstalk update-environment \
            --environment-name "$EB_WEB_ENV_NAME" \
            --version-label "$VERSION_LABEL"
